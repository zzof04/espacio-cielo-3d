
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Espacio Cósmico Chileno - Instalación 3D</title>
<style>
body {
margin: 0;
overflow: hidden;
background: #000;
font-family: Arial, sans-serif;
}
canvas {
display: block;
}
#info {
position: absolute;
top: 10px;
left: 10px;
color: #fff;
background: rgba(0, 0, 0, 0.6);
padding: 10px;
border-radius: 4px;
font-size: 14px;
}
</style>
<!-- Three.js -->
<script src="https://cdn.jsdelivr.net/npm/three@0.152.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>
<div id="info">
<h3>Espacio Cósmico Chileno</h3>
<p>Mueve el ratón para navegar el espacio 3D. Haz scroll o usa las flechas para deformar el campo de nebulosas.</p>
</div>

<script>
// ESCENA 3D
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

// CÁMARA
camera.position.set(0, 0, 5);

// LUZ
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(1, 1, 1);
scene.add(light);

// CARGAR TU OBJETO DE BLENDER (GLB)
const loader = new THREE.GLTFLoader();
loader.load(
'models/cielo_3d.glb', // ruta al archivo exportado desde Blender
(gltf) => {
const model = gltf.scene;
scene.add(model);

// ejemplo: rotar el modelo un poco
model.rotation.y = Math.PI / 4;
},
(xhr) => {
console.log((xhr.loaded / xhr.total * 100) + '% cargado');
},
(error) => {
console.error('Error al cargar el modelo:', error);
}
);

// CONTROLES (para que el usuario navegue el espacio 3D)
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;

// ANIMACIÓN
function animate() {
requestAnimationFrame(animate);
controls.update();
renderer.render(scene, camera);
}
animate();

// RESIZE
window.addEventListener('resize', () => {
camera.aspect = window.innerWidth / window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
